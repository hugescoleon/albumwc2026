<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" width="100%" height="100%">
  <!-- Golden Gradient and Shadow Glow Definition -->
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="50%" stop-color="#F5AF19" />
      <stop offset="100%" stop-color="#E65C00" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#F5AF19" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Clean Minimalist Trophy Path -->
  <!-- Left Handle -->
  <path d="M170 140h-40c-15 0-26 11-26 26v48c0 15 11 26 26 26h40" stroke="url(#gold-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Handle (Symmetrical) -->
  <path d="M342 140h40c15 0 26 11 26 26v48c0 15-11 26-26 26h-40" stroke="url(#gold-grad)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Stem / Stand -->
  <path d="M256 310v96" stroke="url(#gold-grad)" stroke-width="28" stroke-linecap="round" />
  
  <!-- Base -->
  <path d="M172 416h168" stroke="url(#gold-grad)" stroke-width="36" stroke-linecap="round" />

  <!-- Main Cup Shape -->
  <path d="M160 96h192v128c0 53-43 96-96 96s-96-43-96-96V96z" fill="url(#gold-grad)" filter="url(#glow)" />
  
  <!-- Little Star in the center for premium feeling -->
  <path d="M256 142l7 14 16 2-12 11 4 16-15-9-15 9 4-16-12-11 16-2 7-14z" fill="#FFFFFF" opacity="0.95" />
</svg>